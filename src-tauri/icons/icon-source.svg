<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fabd7a"/>
      <stop offset="40%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#d86933"/>
    </linearGradient>
    <linearGradient id="topLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f2f2"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- 顶部高光 -->
  <rect x="24" y="24" width="976" height="460" rx="206" fill="url(#topLight)"/>

  <!-- 底部微阴影增加立体感 -->
  <rect x="24" y="520" width="976" height="480" rx="206" fill="#000000" fill-opacity="0.05"/>

  <!-- 前景图标：工具箱（更饱满） -->
  <g transform="translate(512, 582) scale(1.05)">
    <!-- 提手：更粗更短，半圆拱形 -->
    <path d="M -150,-170 Q -150,-350 0,-350 Q 150,-350 150,-170"
          fill="none" stroke="url(#bodyGrad)" stroke-width="56" stroke-linecap="round"/>

    <!-- 盖子阴影 -->
    <rect x="-300" y="-170" width="600" height="96" rx="28" fill="#000000" fill-opacity="0.14" transform="translate(0, 6)"/>
    <!-- 盖子：更宽 -->
    <rect x="-300" y="-170" width="600" height="96" rx="28" fill="url(#bodyGrad)"/>

    <!-- 箱体阴影 -->
    <rect x="-290" y="-74" width="580" height="290" rx="36" fill="#000000" fill-opacity="0.14" transform="translate(0, 6)"/>
    <!-- 箱体：更宽 -->
    <rect x="-290" y="-74" width="580" height="290" rx="36" fill="url(#bodyGrad)"/>

    <!-- 锁扣 -->
    <rect x="-42" y="-46" width="84" height="72" rx="16" fill="#f4a261"/>
    <circle cx="0" cy="-16" r="16" fill="#d86933"/>

    <!-- 装饰线条 -->
    <rect x="-190" y="60" width="380" height="16" rx="8" fill="#e9c46a" opacity="0.45"/>
    <rect x="-190" y="110" width="260" height="16" rx="8" fill="#e9c46a" opacity="0.30"/>

    <!-- AI sparkle：更大 -->
    <circle cx="230" cy="-240" r="44" fill="url(#bodyGrad)"/>
    <path d="M 230,-266 L 236,-240 L 230,-214 L 224,-240 Z" fill="#f4a261"/>
    <path d="M 204,-240 L 230,-246 L 256,-240 L 230,-234 Z" fill="#f4a261"/>
  </g>
</svg>
