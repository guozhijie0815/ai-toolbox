<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Toolbox - Skill Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d86933',
                        'primary-dark': '#22d3ee',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .skill-card { transition: all 0.2s ease; }
        .skill-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1); }
        .tool-badge { transition: all 0.2s; }
        .tool-badge:hover { transform: scale(1.1); }
        .sync-btn { transition: all 0.2s; }
        .sync-btn:hover { transform: translateX(3px); }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .orphan-indicator { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-primary dark:bg-primary-dark rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-toolbox text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">AI Toolbox</h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Skill Center</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs px-2 py-1 rounded-full bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300">
                    <i class="fa-solid fa-database mr-1"></i>
                    ~/.ai-toolbox/skills/
                </span>
                <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:inline"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Stats Bar -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">中心技能</p>
                        <p class="text-2xl font-bold mt-1" id="centerCount">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 dark:text-blue-400">
                        <i class="fa-solid fa-database"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">游离技能</p>
                        <p class="text-2xl font-bold mt-1 text-orange-600 dark:text-orange-400" id="orphanCount">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-orange-100 dark:bg-orange-900 flex items-center justify-center text-orange-600 dark:text-orange-400">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">待同步</p>
                        <p class="text-2xl font-bold mt-1 text-yellow-600 dark:text-yellow-400" id="pendingCount">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-yellow-100 dark:bg-yellow-900 flex items-center justify-center text-yellow-600 dark:text-yellow-400">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">已同步</p>
                        <p class="text-2xl font-bold mt-1 text-green-600 dark:text-green-400" id="syncedCount">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-green-100 dark:bg-green-900 flex items-center justify-center text-green-600 dark:text-green-400">
                        <i class="fa-solid fa-check-double"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Tabs -->
        <div class="flex items-center gap-2 mb-6 border-b border-gray-200 dark:border-gray-700 pb-1">
            <button onclick="switchTab('center')" id="tab-center" class="px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-primary dark:border-primary-dark text-primary dark:text-primary-dark bg-blue-50 dark:bg-blue-900/20">
                <i class="fa-solid fa-database mr-2"></i>技能中心
            </button>
            <button onclick="switchTab('orphan')" id="tab-orphan" class="px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i>游离技能
                <span class="ml-1 px-1.5 py-0.5 text-xs rounded-full bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300" id="orphanBadge">0</span>
            </button>
        </div>

        <!-- Toolbar -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="搜索技能..." 
                           class="pl-10 pr-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-primary/20 dark:focus:ring-primary-dark/20"
                           oninput="filterSkills()">
                </div>
                <select id="filterTool" onchange="filterSkills()" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm focus:outline-none">
                    <option value="">所有工具</option>
                    <option value="claude">Claude</option>
                    <option value="cursor">Cursor</option>
                    <option value="opencode">OpenCode</option>
                    <option value="codex">Codex</option>
                </select>
                <select id="filterStatus" onchange="filterSkills()" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-sm focus:outline-none">
                    <option value="">所有状态</option>
                    <option value="synced">已同步</option>
                    <option value="pending">待同步</option>
                    <option value="missing">未安装</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="syncAll()" class="px-4 py-2 bg-primary dark:bg-primary-dark text-white rounded-lg text-sm font-medium hover:opacity-90 transition-opacity">
                    <i class="fa-solid fa-arrows-rotate mr-2"></i>一键同步全部
                </button>
            </div>
        </div>

        <!-- Skills Grid -->
        <div id="skillsGrid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
            <!-- Skills will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-gray-400">
            <i class="fa-solid fa-box-open text-5xl mb-4"></i>
            <p class="text-lg">暂无技能</p>
        </div>
    </div>

    <!-- Sync Modal -->
    <div id="syncModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl max-w-lg w-full max-h-[80vh] overflow-hidden">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold">同步技能</h3>
                    <button onclick="closeSyncModal()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" id="syncSkillName">技能名称</p>
            </div>
            <div class="p-6 overflow-y-auto">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">选择要同步到的目标工具：</p>
                <div id="syncTargets" class="space-y-2">
                    <!-- Target tools will be rendered here -->
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button onclick="closeSyncModal()" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    取消
                </button>
                <button onclick="confirmSync()" class="px-4 py-2 rounded-lg bg-primary dark:bg-primary-dark text-white text-sm font-medium hover:opacity-90 transition-opacity">
                    执行同步
                </button>
            </div>
        </div>
    </div>

    <!-- Adopt Modal -->
    <div id="adoptModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl max-w-lg w-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold">纳入技能中心</h3>
                    <button onclick="closeAdoptModal()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" id="adoptSkillName">技能名称</p>
            </div>
            <div class="p-6">
                <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4 mb-4">
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-circle-info text-yellow-600 dark:text-yellow-400 mt-0.5"></i>
                        <div>
                            <p class="text-sm font-medium text-yellow-800 dark:text-yellow-200">将技能复制到中心仓库</p>
                            <p class="text-xs text-yellow-600 dark:text-yellow-400 mt-1">纳入后，该技能将由 Skill Center 统一管理，可从中心同步到所有工具。</p>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <input type="checkbox" checked class="rounded text-primary dark:text-primary-dark" id="adoptCopyToCenter">
                        <div>
                            <p class="text-sm font-medium">复制到 ~/.ai-toolbox/skills/</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">建立中心副本</p>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <input type="checkbox" checked class="rounded text-primary dark:text-primary-dark" id="adoptKeepOriginal">
                        <div>
                            <p class="text-sm font-medium">保留原工具中的副本</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">不删除原位置文件</p>
                        </div>
                    </label>
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button onclick="closeAdoptModal()" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    取消
                </button>
                <button onclick="confirmAdopt()" class="px-4 py-2 rounded-lg bg-primary dark:bg-primary-dark text-white text-sm font-medium hover:opacity-90 transition-opacity">
                    确认纳入
                </button>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        const tools = [
            { id: 'claude', name: 'Claude', icon: 'fa-solid fa-robot', color: 'bg-orange-500' },
            { id: 'cursor', name: 'Cursor', icon: 'fa-solid fa-i-cursor', color: 'bg-blue-500' },
            { id: 'opencode', name: 'OpenCode', icon: 'fa-solid fa-code', color: 'bg-purple-500' },
            { id: 'codex', name: 'Codex', icon: 'fa-solid fa-terminal', color: 'bg-green-500' },
        ];

        // 中心仓库技能
        const centerSkills = [
            {
                id: 'git-commit-push',
                name: 'Git Commit Push',
                description: '自动分析改动并提交推送',
                updatedAt: '2025-05-11 10:30',
                tools: { claude: 'synced', cursor: 'synced', opencode: 'pending', codex: 'missing' }
            },
            {
                id: 'code-review',
                name: 'Code Review Risk First',
                description: '以风险优先方式进行代码审查',
                updatedAt: '2025-05-10 16:45',
                tools: { claude: 'synced', cursor: 'synced', opencode: 'synced', codex: 'synced' }
            },
            {
                id: 'archery-sql',
                name: 'Archery SQL',
                description: '在 Archery SQL 平台执行在线查询',
                updatedAt: '2025-05-09 09:20',
                tools: { claude: 'pending', cursor: 'missing', opencode: 'synced', codex: 'missing' }
            },
            {
                id: 'zdm-loki',
                name: 'ZDM Loki',
                description: '查询应用 Loki 日志',
                updatedAt: '2025-05-08 14:15',
                tools: { claude: 'synced', cursor: 'pending', opencode: 'pending', codex: 'missing' }
            },
            {
                id: 'php-to-java',
                name: 'PHP to Java',
                description: '将 PHP 接口迁移到 Java 项目',
                updatedAt: '2025-05-07 11:00',
                tools: { claude: 'synced', cursor: 'synced', opencode: 'synced', codex: 'synced' }
            },
            {
                id: 'preflight',
                name: 'Preflight',
                description: '扫描 Git 改动生成上线清单',
                updatedAt: '2025-05-06 08:30',
                tools: { claude: 'missing', cursor: 'missing', opencode: 'synced', codex: 'pending' }
            }
        ];

        // 游离技能（工具有但中心没有）
        const orphanSkills = [
            {
                id: 'custom-tool-1',
                name: 'My Custom Skill',
                description: '在 Cursor 中创建的自定义技能',
                sourceTool: 'cursor',
                updatedAt: '2025-05-11 09:00',
                path: '~/.cursor/skills/my-custom-skill'
            },
            {
                id: 'custom-tool-2',
                name: 'Legacy Helper',
                description: '旧的辅助工具技能',
                sourceTool: 'claude',
                updatedAt: '2025-05-05 14:20',
                path: '~/.claude/skills/legacy-helper'
            }
        ];

        let currentTab = 'center';
        let selectedSkillForSync = null;
        let selectedSkillForAdopt = null;

        function init() {
            updateStats();
            renderSkills();
        }

        function updateStats() {
            const centerCount = centerSkills.length;
            const orphanCount = orphanSkills.length;
            
            let pendingCount = 0;
            let syncedCount = 0;
            
            centerSkills.forEach(skill => {
                Object.values(skill.tools).forEach(status => {
                    if (status === 'pending') pendingCount++;
                    if (status === 'synced') syncedCount++;
                });
            });

            document.getElementById('centerCount').textContent = centerCount;
            document.getElementById('orphanCount').textContent = orphanCount;
            document.getElementById('pendingCount').textContent = pendingCount;
            document.getElementById('syncedCount').textContent = syncedCount;
            document.getElementById('orphanBadge').textContent = orphanCount;
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'synced': return '<i class="fa-solid fa-check text-green-500"></i>';
                case 'pending': return '<i class="fa-solid fa-clock text-yellow-500"></i>';
                case 'missing': return '<i class="fa-solid fa-xmark text-gray-400 dark:text-gray-500"></i>';
                default: return '';
            }
        }

        function getStatusLabel(status) {
            switch(status) {
                case 'synced': return '已同步';
                case 'pending': return '待同步';
                case 'missing': return '未安装';
                default: return '';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'synced': return 'text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/20';
                case 'pending': return 'text-yellow-600 dark:text-yellow-400 bg-yellow-50 dark:bg-yellow-900/20';
                case 'missing': return 'text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-800';
                default: return '';
            }
        }

        function renderSkills() {
            const grid = document.getElementById('skillsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterTool = document.getElementById('filterTool').value;
            const filterStatus = document.getElementById('filterStatus').value;

            let skills = currentTab === 'center' ? centerSkills : orphanSkills;
            
            // Filter
            skills = skills.filter(skill => {
                if (searchTerm && !skill.name.toLowerCase().includes(searchTerm) && 
                    !skill.description.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                if (currentTab === 'center') {
                    if (filterTool && skill.tools[filterTool] === 'missing') return false;
                    if (filterStatus) {
                        const hasStatus = Object.values(skill.tools).some(s => s === filterStatus);
                        if (!hasStatus) return false;
                    }
                } else {
                    if (filterTool && skill.sourceTool !== filterTool) return false;
                }
                return true;
            });

            if (skills.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            grid.innerHTML = skills.map(skill => {
                if (currentTab === 'center') {
                    return renderCenterSkill(skill);
                } else {
                    return renderOrphanSkill(skill);
                }
            }).join('');
        }

        function renderCenterSkill(skill) {
            const toolStatuses = tools.map(tool => ({
                ...tool,
                status: skill.tools[tool.id]
            }));

            const allSynced = toolStatuses.every(t => t.status === 'synced');
            const hasPending = toolStatuses.some(t => t.status === 'pending');

            return `
                <div class="skill-card bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-lg truncate">${skill.name}</h3>
                                ${allSynced ? '<span class="px-2 py-0.5 text-xs rounded-full bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300"><i class="fa-solid fa-check mr-1"></i>全部同步</span>' : ''}
                                ${hasPending ? '<span class="px-2 py-0.5 text-xs rounded-full bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300"><i class="fa-solid fa-clock mr-1"></i>待同步</span>' : ''}
                            </div>
                            <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2">${skill.description}</p>
                        </div>
                        <button onclick="openSyncModal('${skill.id}')" class="sync-btn ml-3 p-2 rounded-lg bg-primary/10 dark:bg-primary-dark/10 text-primary dark:text-primary-dark hover:bg-primary/20 dark:hover:bg-primary-dark/20 transition-colors" title="同步">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </div>

                    <div class="mb-4">
                        <p class="text-xs text-gray-400 dark:text-gray-500 mb-2">同步状态</p>
                        <div class="grid grid-cols-4 gap-2">
                            ${toolStatuses.map(tool => `
                                <div class="tool-badge flex flex-col items-center p-2 rounded-lg ${getStatusClass(tool.status)} border border-transparent">
                                    <div class="w-8 h-8 ${tool.color} rounded-full flex items-center justify-center text-white text-xs mb-1">
                                        <i class="${tool.icon}"></i>
                                    </div>
                                    <span class="text-xs font-medium">${tool.name}</span>
                                    <span class="text-xs mt-0.5">${getStatusIcon(tool.status)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-700">
                        <span class="text-xs text-gray-400 dark:text-gray-500">
                            <i class="fa-regular fa-clock mr-1"></i>${skill.updatedAt}
                        </span>
                        <div class="flex gap-2">
                            <button onclick="editSkill('${skill.id}')" class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class="fa-solid fa-pen mr-1"></i>编辑
                            </button>
                            <button onclick="openSyncModal('${skill.id}')" class="text-xs px-3 py-1.5 rounded-lg bg-primary/10 dark:bg-primary-dark/10 text-primary dark:text-primary-dark hover:bg-primary/20 dark:hover:bg-primary-dark/20 transition-colors">
                                <i class="fa-solid fa-share-nodes mr-1"></i>同步
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrphanSkill(skill) {
            const sourceTool = tools.find(t => t.id === skill.sourceTool);
            return `
                <div class="skill-card bg-white dark:bg-gray-800 rounded-xl border border-orange-200 dark:border-orange-800 p-5">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-lg truncate">${skill.name}</h3>
                                <span class="orphan-indicator px-2 py-0.5 text-xs rounded-full bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300">
                                    <i class="fa-solid fa-triangle-exclamation mr-1"></i>游离
                                </span>
                            </div>
                            <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2">${skill.description}</p>
                        </div>
                        <div class="w-10 h-10 ${sourceTool?.color || 'bg-gray-500'} rounded-full flex items-center justify-center text-white ml-3">
                            <i class="${sourceTool?.icon || 'fa-solid fa-question'}"></i>
                        </div>
                    </div>

                    <div class="bg-orange-50 dark:bg-orange-900/20 rounded-lg p-3 mb-4">
                        <div class="flex items-center gap-2 text-sm text-orange-800 dark:text-orange-200">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>位于 <strong>${sourceTool?.name || skill.sourceTool}</strong> 的独立技能</span>
                        </div>
                        <p class="text-xs text-orange-600 dark:text-orange-400 mt-1 ml-6 font-mono">${skill.path}</p>
                    </div>

                    <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-700">
                        <span class="text-xs text-gray-400 dark:text-gray-500">
                            <i class="fa-regular fa-clock mr-1"></i>${skill.updatedAt}
                        </span>
                        <div class="flex gap-2">
                            <button onclick="openPath('${skill.path}')" class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class="fa-solid fa-folder-open mr-1"></i>打开
                            </button>
                            <button onclick="openAdoptModal('${skill.id}')" class="text-xs px-3 py-1.5 rounded-lg bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300 hover:bg-orange-200 dark:hover:bg-orange-800 transition-colors">
                                <i class="fa-solid fa-plus mr-1"></i>纳入中心
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab styles
            document.getElementById('tab-center').className = tab === 'center' 
                ? 'px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-primary dark:border-primary-dark text-primary dark:text-primary-dark bg-blue-50 dark:bg-blue-900/20'
                : 'px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200';
            
            document.getElementById('tab-orphan').className = tab === 'orphan'
                ? 'px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-orange-500 text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20'
                : 'px-4 py-2 rounded-t-lg font-medium text-sm border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200';

            // Update filter options
            const statusFilter = document.getElementById('filterStatus');
            if (tab === 'orphan') {
                statusFilter.innerHTML = `
                    <option value="">所有状态</option>
                    <option value="orphan">游离</option>
                `;
                statusFilter.disabled = true;
            } else {
                statusFilter.innerHTML = `
                    <option value="">所有状态</option>
                    <option value="synced">已同步</option>
                    <option value="pending">待同步</option>
                    <option value="missing">未安装</option>
                `;
                statusFilter.disabled = false;
            }

            renderSkills();
        }

        function filterSkills() {
            renderSkills();
        }

        function openSyncModal(skillId) {
            const skill = centerSkills.find(s => s.id === skillId);
            if (!skill) return;
            
            selectedSkillForSync = skill;
            document.getElementById('syncSkillName').textContent = skill.name;
            
            const targetsDiv = document.getElementById('syncTargets');
            targetsDiv.innerHTML = tools.map(tool => {
                const status = skill.tools[tool.id];
                const isSynced = status === 'synced';
                return `
                    <label class="flex items-center gap-3 p-3 rounded-lg border ${isSynced ? 'border-gray-200 dark:border-gray-700 opacity-50' : 'border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700'} transition-colors">
                        <input type="checkbox" ${isSynced ? 'disabled checked' : ''} value="${tool.id}" class="sync-target-check rounded text-primary dark:text-primary-dark" ${isSynced ? 'disabled' : ''}>
                        <div class="w-8 h-8 ${tool.color} rounded-full flex items-center justify-center text-white text-xs">
                            <i class="${tool.icon}"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-medium">${tool.name}</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">${getStatusLabel(status)}</p>
                        </div>
                        <span class="text-sm">${getStatusIcon(status)}</span>
                    </label>
                `;
            }).join('');
            
            document.getElementById('syncModal').classList.remove('hidden');
        }

        function closeSyncModal() {
            document.getElementById('syncModal').classList.add('hidden');
            selectedSkillForSync = null;
        }

        function confirmSync() {
            if (!selectedSkillForSync) return;
            
            const checkedTargets = document.querySelectorAll('.sync-target-check:checked:not(:disabled)');
            const targetIds = Array.from(checkedTargets).map(cb => cb.value);
            
            if (targetIds.length === 0) {
                alert('请至少选择一个目标工具');
                return;
            }
            
            // Simulate sync
            targetIds.forEach(toolId => {
                selectedSkillForSync.tools[toolId] = 'synced';
            });
            
            updateStats();
            renderSkills();
            closeSyncModal();
            
            // Show success toast
            showToast(`已将「${selectedSkillForSync.name}」同步到 ${targetIds.length} 个工具`);
        }

        function openAdoptModal(skillId) {
            const skill = orphanSkills.find(s => s.id === skillId);
            if (!skill) return;
            
            selectedSkillForAdopt = skill;
            document.getElementById('adoptSkillName').textContent = skill.name;
            document.getElementById('adoptModal').classList.remove('hidden');
        }

        function closeAdoptModal() {
            document.getElementById('adoptModal').classList.add('hidden');
            selectedSkillForAdopt = null;
        }

        function confirmAdopt() {
            if (!selectedSkillForAdopt) return;
            
            // Simulate adopt: move from orphan to center
            const newCenterSkill = {
                id: selectedSkillForAdopt.id,
                name: selectedSkillForAdopt.name,
                description: selectedSkillForAdopt.description,
                updatedAt: selectedSkillForAdopt.updatedAt,
                tools: { claude: 'pending', cursor: 'pending', opencode: 'pending', codex: 'pending' }
            };
            
            // Mark the source tool as synced
            newCenterSkill.tools[selectedSkillForAdopt.sourceTool] = 'synced';
            
            centerSkills.push(newCenterSkill);
            
            // Remove from orphan
            const index = orphanSkills.findIndex(s => s.id === selectedSkillForAdopt.id);
            if (index > -1) orphanSkills.splice(index, 1);
            
            updateStats();
            renderSkills();
            closeAdoptModal();
            
            showToast(`已将「${newCenterSkill.name}」纳入技能中心`);
        }

        function editSkill(skillId) {
            const skill = centerSkills.find(s => s.id === skillId);
            if (!skill) return;
            showToast(`编辑技能：${skill.name}（演示模式）`);
        }

        function openPath(path) {
            showToast(`打开目录：${path}`);
        }

        function syncAll() {
            let syncCount = 0;
            centerSkills.forEach(skill => {
                Object.keys(skill.tools).forEach(toolId => {
                    if (skill.tools[toolId] === 'pending') {
                        skill.tools[toolId] = 'synced';
                        syncCount++;
                    }
                });
            });
            
            updateStats();
            renderSkills();
            showToast(`已同步 ${syncCount} 个技能实例`);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-gray-800 dark:bg-gray-700 text-white px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2 animate-bounce';
            toast.innerHTML = `<i class="fa-solid fa-check-circle text-green-400"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Initialize
        init();
    </script>
</body>
</html>
